# Local dev dependencies. Requires Docker.
# If you don't have Docker, point DATABASE_URL/REDIS_URL at a hosted Postgres
# (must have the pgvector extension) and a hosted Redis instead.
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sahaj
    ports:
      - "5432:5432"
    volumes:
      - sahaj_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sahaj"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - sahaj_redisdata:/data

volumes:
  sahaj_pgdata:
  sahaj_redisdata:
